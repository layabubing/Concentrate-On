<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Floating Widget Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: #1f2937;
      user-select: none;
    }

    .widget {
      width: 100vw;
      height: 100vh;
      padding: 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(31, 41, 55, 0.12);
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.24);
      backdrop-filter: blur(18px);
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 36px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .pin {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      border-radius: 7px;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      line-height: 1;
    }

    .close {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.06);
      color: #475569;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .close:hover {
      background: #fee2e2;
      color: #b91c1c;
    }

    .content {
      display: grid;
      gap: 10px;
      padding-top: 12px;
    }

    .timer {
      display: flex;
      align-items: baseline;
      gap: 8px;
      color: #0f172a;
    }

    .time {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
    }

    .label {
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e2e8f0;
    }

    .progress span {
      display: block;
      width: 64%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #22c55e);
    }

    .hint {
      margin: 0;
      color: #64748b;
      font-size: 12px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }

    .action {
      flex: 1;
      height: 32px;
      border: 0;
      border-radius: 8px;
      background: #f1f5f9;
      color: #334155;
      cursor: pointer;
      font-weight: 700;
    }

    .action.primary {
      background: #2563eb;
      color: #fff;
    }

    button {
      font-family: inherit;
      -webkit-app-region: no-drag;
    }
  </style>
</head>
<body>
  <main class="widget">
    <header class="titlebar" id="drag-region">
      <div class="title">
        <span class="pin">置</span>
        <span>顶层浮窗 Demo</span>
      </div>
      <button class="close" type="button" aria-label="关闭" id="close-button">×</button>
    </header>

    <section class="content">
      <div class="timer">
        <span class="time">25:00</span>
        <span class="label">专注中</span>
      </div>

      <div class="progress" aria-hidden="true">
        <span></span>
      </div>

      <p class="hint">窗口使用 pywebview 的 on_top 保持置顶，并通过 easy_drag 支持整体拖动。</p>

      <div class="actions">
        <button class="action primary" type="button">开始</button>
        <button class="action" type="button">暂停</button>
      </div>
    </section>
  </main>

  <script>
    const closeButton = document.getElementById("close-button");

    function apiReady() {
      return window.pywebview && window.pywebview.api;
    }

    closeButton.addEventListener("click", () => {
      if (apiReady()) {
        window.pywebview.api.close();
      }
    });
  </script>
</body>
</html>
