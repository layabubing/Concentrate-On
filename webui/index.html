<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConcentrateOn</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div id="app" v-cloak>
      <div class="app-frame" :class="{ focusing: isFocusing }">
        <main class="shell">
          <header class="topbar">
            <div>
              <p class="brand">ConcentrateOn</p>
              <h1>{{ pageTitle }}</h1>
            </div>
            <p class="top-note">{{ pageNote }}</p>
          </header>

          <focus-page v-show="activePage === 'focus'"></focus-page>
          <tasks-page v-show="activePage === 'tasks'"></tasks-page>
          <stats-page v-show="activePage === 'stats'"></stats-page>
          <settings-page v-show="activePage === 'settings'"></settings-page>
        </main>

        <nav class="app-nav" aria-label="主导航">
          <button
            v-for="item in navItems"
            :key="item.key"
            class="nav-item"
            :class="{ active: activePage === item.key }"
            type="button"
            @click="selectPage(item.key)"
          >
            <span class="nav-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </button>
        </nav>
      </div>
    </div>

    <script src="/vendor/vue.global.prod.js"></script>
    <script src="/components/focus-page.js"></script>
    <script src="/components/tasks-page.js"></script>
    <script src="/components/stats-page.js"></script>
    <script src="/components/settings-page.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
